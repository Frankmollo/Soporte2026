services:
  - type: web
    name: tumomito-backend
    env: docker
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      # URL pública HTTPS del Web Service (cookies, redirects, asset URLs). No usar hashes ni IDs.
      - key: APP_URL
        value: https://soporte2026-1.onrender.com
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: DB_EMULATE_PREPARES
        value: "true"
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: RUN_MIGRATIONS
        value: "true"
